<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale 730 - Ricadute 2026</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --bg: #f4f7f6; --text: #333;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        header { border-bottom: 3px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.5rem; color: var(--primary); }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #ddd; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; font-weight: bold; margin-bottom: 5px; color: #666; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        
        .btn-submit { grid-column: 1 / -1; background: var(--success); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .btn-submit:hover { background: #219150; }
        .btn-submit:disabled { background: #ccc; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .badge-singolo { background: #d1ecf1; color: #0c5460; }
        .badge-congiunto { background: #d4edda; color: #155724; }
        
        .status { font-size: 0.8rem; color: #888; }
        #loader { display: none; text-align: center; padding: 10px; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>730 Sospesi - Ricadute 2026</h1>
        <div id="syncStatus" class="status">Verifica connessione...</div>
    </header>

    <form id="mainForm" class="form-grid">
        <div class="group">
            <label>Cliente</label>
            <input type="text" id="cliente" required placeholder="Cognome Nome">
        </div>
        <div class="group">
            <label>Tipo</label>
            <select id="tipo">
                <option value="Singolo">Singolo</option>
                <option value="Congiunto">Congiunto</option>
            </select>
        </div>
        <div class="group">
            <label>Operatore</label>
            <input type="text" id="operatore" required placeholder="Tuo Nome">
        </div>
        <div class="group">
            <label>Motivazione</label>
            <input type="text" id="motivazione" required placeholder="Perché è sospesa?">
        </div>
        <button type="submit" id="btnInvia" class="btn-submit">Registra Pratica</button>
    </form>

    <div id="loader">Invio al database Google in corso...</div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Tipo</th>
                    <th>Motivazione</th>
                    <th>Operatore</th>
                </tr>
            </thead>
            <tbody id="tabellaCorpo"></tbody>
        </table>
    </div>
</div>

<script>
    // URL AGGIORNATO
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxK497ktBj1C-R0vdVulUlWDsNsBNQthCiIIEpnWZ1JpaCA8UeBAoiNZ8-StXw4FnpS/exec";

    async function caricaDati() {
        const status = document.getElementById('syncStatus');
        status.innerText = "Sincronizzazione...";
        try {
            const r = await fetch(SCRIPT_URL);
            const dati = await r.json();
            const corpo = document.getElementById('tabellaCorpo');
            corpo.innerHTML = '';

            if (dati.length === 0) {
                status.innerText = "Database vuoto";
                return;
            }

            dati.reverse().forEach(p => {
                // Gestione flessibile nomi colonne (maiusecole/minuscole)
                const d = p.data || p.Data || "";
                const c = p.cliente || p.Cliente || "";
                const t = p.tipo || p.Tipo || "Singolo";
                const m = p.motivazione || p.Motivazione || "";
                const o = p.operatore || p.Operatore || "";

                const bClass = t.toString().toLowerCase() === 'singolo' ? 'badge-singolo' : 'badge-congiunto';
                const dataFmt = d ? new Date(d).toLocaleDateString('it-IT') : "-";

                corpo.innerHTML += `
                    <tr>
                        <td>${dataFmt}</td>
                        <td><strong>${c}</strong></td>
                        <td><span class="badge ${bClass}">${t}</span></td>
                        <td>${m}</td>
                        <td>${o}</td>
                    </tr>`;
            });
            status.innerText = "Sincronizzato alle " + new Date().toLocaleTimeString();
        } catch (e) {
            status.innerText = "Errore di connessione al Foglio Google";
        }
    }

    document.getElementById('mainForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnInvia');
        const load = document.getElementById('loader');
        
        const payload = {
            cliente: document.getElementById('cliente').value,
            tipo: document.getElementById('tipo').value,
            operatore: document.getElementById('operatore').value,
            motivazione: document.getElementById('motivazione').value
        };

        btn.disabled = true;
        load.style.display = "block";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            
            document.getElementById('mainForm').reset();
            setTimeout(() => {
                load.style.display = "none";
                btn.disabled = false;
                caricaDati();
            }, 1500);
        } catch (err) {
            alert("Errore nell'invio");
            btn.disabled = false;
            load.style.display = "none";
        }
    };

    // Caricamento iniziale
    caricaDati();
</script>

</body>
</html>
