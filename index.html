<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale 730 Sospesi - Cloud Sync</title>
    <style>
        :root {
            --primary: #2c3e50; --accent: #3498db; --success: #27ae60;
            --bg: #f4f7f6; --text: #333;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        header { border-bottom: 3px solid var(--accent); margin-bottom: 25px; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        h1 { margin: 0; font-size: 1.6rem; color: var(--primary); }

        /* Form Professionale */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        
        .btn-submit { grid-column: 1 / -1; background: var(--success); color: white; border: none; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #219150; transform: translateY(-1px); }
        .btn-submit:disabled { background: #bdc3c7; cursor: not-allowed; }

        /* Tabella */
        .table-area { margin-top: 30px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.95rem; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        tr:hover { background-color: #f1f7ff; }

        /* Badge e Status */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .badge-singolo { background: #e3f2fd; color: #1976d2; }
        .badge-congiunto { background: #e8f5e9; color: #2e7d32; }
        .sync-indicator { font-size: 0.8rem; color: #7f8c8d; }
        
        #loader { display: none; text-align: center; margin: 10px 0; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Gestione Sospesi 730</h1>
        <div id="syncStatus" class="sync-indicator">In attesa...</div>
    </header>

    <form id="form730" class="form-grid">
        <div class="group">
            <label>Nome e Cognome Cliente</label>
            <input type="text" id="cliente" required placeholder="Mario Rossi">
        </div>
        <div class="group">
            <label>Tipo Dichiarazione</label>
            <select id="tipo">
                <option value="Singolo">Singolo</option>
                <option value="Congiunto">Congiunto</option>
            </select>
        </div>
        <div class="group">
            <label>Nome Operatore</label>
            <input type="text" id="operatore" required placeholder="Es. Anna">
        </div>
        <div class="group">
            <label>Motivazione Sospensione</label>
            <input type="text" id="motivazione" required placeholder="Es. Manca CU">
        </div>
        <button type="submit" id="submitBtn" class="btn-submit">Invia al Cloud</button>
    </form>

    <div id="loader">Invio dati in corso al foglio Google...</div>

    <div class="table-area">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Tipo</th>
                    <th>Motivazione</th>
                    <th>Operatore</th>
                </tr>
            </thead>
            <tbody id="tabellaCorpo">
                </tbody>
        </table>
    </div>
</div>

<script>
    // IL TUO URL DI GOOGLE APPS SCRIPT
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzsd-4dNYvb5TETYtm7XUH_PoX2arFeToNIXRXSzQmcc-i-5lvkGAAPpjKYzCbno7lo/exec";

    const form = document.getElementById('form730');
    const loader = document.getElementById('loader');
    const syncStatus = document.getElementById('syncStatus');
    const submitBtn = document.getElementById('submitBtn');

    // Funzione per caricare i dati dal foglio
    async function caricaDati() {
        syncStatus.innerText = "Sincronizzazione in corso...";
        try {
            const response = await fetch(SCRIPT_URL);
            const dati = await response.json();
            const corpo = document.getElementById('tabellaCorpo');
            corpo.innerHTML = '';
            
            // Mostriamo gli ultimi inseriti per primi
            dati.reverse().forEach(p => {
                const dataObj = new Date(p.data);
                const dataFmt = isNaN(dataObj) ? p.data : dataObj.toLocaleDateString('it-IT');
                const badgeClass = p.tipo === 'Singolo' ? 'badge-singolo' : 'badge-congiunto';
                
                corpo.innerHTML += `
                    <tr>
                        <td>${dataFmt}</td>
                        <td><strong>${p.cliente}</strong></td>
                        <td><span class="badge ${badgeClass}">${p.tipo}</span></td>
                        <td>${p.motivazione}</td>
                        <td>${p.operatore}</td>
                    </tr>`;
            });
            syncStatus.innerText = "Dati aggiornati: " + new Date().toLocaleTimeString();
        } catch (e) {
            syncStatus.innerText = "Errore di connessione";
            console.error(e);
        }
    }

    // Funzione per inviare i dati
    form.onsubmit = async (e) => {
        e.preventDefault();
        
        const payload = {
            cliente: document.getElementById('cliente').value,
            tipo: document.getElementById('tipo').value,
            operatore: document.getElementById('operatore').value,
            motivazione: document.getElementById('motivazione').value
        };

        loader.style.display = "block";
        submitBtn.disabled = true;

        try {
            // Invio dati (mode no-cors per Google Apps Script)
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            form.reset();
            // Aspettiamo un attimo che Google elabori prima di ricaricare
            setTimeout(() => {
                loader.style.display = "none";
                submitBtn.disabled = false;
                caricaDati();
            }, 1500);

        } catch (e) {
            alert("Errore durante l'invio");
            loader.style.display = "none";
            submitBtn.disabled = false;
        }
    };

    // Caricamento iniziale
    caricaDati();
</script>

</body>
</html>
